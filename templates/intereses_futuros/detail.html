{% extends "base.html" %}

{% block title %}Detalle Interes - Gestion Profesoral{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Detalle de Interes de Investigacion</h1>
    <a href="{{ url_for('intereses_futuros.list') }}" class="btn btn-secondary">← Volver al listado</a>
</div>

<div class="detail-container">
    <div class="detail-group">
        <h3>Informacion del Registro</h3>
        <table class="detail-table">
            <tr><th>Docente (Cedula):</th><td>{{ registro.docente }}</td></tr>
            <tr><th>Termino Clave:</th><td>{{ registro.termino_clave }}</td></tr>
        </table>
    </div>
    
    <div class="detail-actions">
        <form method="POST" action="{{ url_for('intereses_futuros.delete', docente=registro.docente, termino_clave=registro.termino_clave) }}" class="inline-form" onsubmit="return confirm('Esta seguro de eliminar este registro?');">
            <button type="submit" class="btn btn-danger">Eliminar</button>
        </form>
    </div>
</div>
{% endblock %}
