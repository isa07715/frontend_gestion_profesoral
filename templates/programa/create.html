{% extends "base.html" %}

{% block title %}Crear Programa Académico - Gestión Profesoral{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Nuevo Programa Académico</h1>
    <a href="{{ url_for('programa.list') }}" class="btn btn-secondary">← Volver al listado</a>
</div>

<div class="form-container">
    <form method="POST" action="{{ url_for('programa.create') }}" class="crud-form">
        <div class="form-row">
            <div class="form-group">
                <label for="id">ID *</label>
                <input type="number" id="id" name="id" required>
            </div>
            
            <div class="form-group">
                <label for="nombre">Nombre *</label>
                <input type="text" id="nombre" name="nombre" required maxlength="60">
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label for="tipo">Tipo *</label>
                <select id="tipo" name="tipo" required>
                    <option value="">Seleccione...</option>
                    <option value="Pregrado">Pregrado</option>
                    <option value="Posgrado">Posgrado</option>
                    <option value="Especialización">Especialización</option>
                    <option value="Maestría">Maestría</option>
                    <option value="Doctorado">Doctorado</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="nivel">Nivel *</label>
                <select id="nivel" name="nivel" required>
                    <option value="">Seleccione...</option>
                    <option value="Técnico">Técnico</option>
                    <option value="Tecnológico">Tecnológico</option>
                    <option value="Profesional">Profesional</option>
                    <option value="Especialización">Especialización</option>
                    <option value="Maestría">Maestría</option>
                    <option value="Doctorado">Doctorado</option>
                </select>
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label for="fecha_creacion">Fecha de Creación *</label>
                <input type="date" id="fecha_creacion" name="fecha_creacion" required>
            </div>
            
            <div class="form-group">
                <label for="fecha_cierre">Fecha de Cierre</label>
                <input type="date" id="fecha_cierre" name="fecha_cierre">
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label for="numero_cohortes">Número de Cohortes *</label>
                <input type="text" id="numero_cohortes" name="numero_cohortes" required maxlength="45">
            </div>
            
            <div class="form-group">
                <label for="cant_graduados">Cantidad de Graduados *</label>
                <input type="text" id="cant_graduados" name="cant_graduados" required maxlength="45">
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label for="fecha_actualizacion">Fecha de Actualización *</label>
                <input type="date" id="fecha_actualizacion" name="fecha_actualizacion" required>
            </div>
            
            <div class="form-group">
                <label for="ciudad">Ciudad *</label>
                <input type="text" id="ciudad" name="ciudad" required maxlength="45">
            </div>
        </div>
        
        <div class="form-group">
            <label for="facultad">Facultad (ID) *</label>
            <input type="number" id="facultad" name="facultad" required>
            <small class="form-help">ID de la facultad a la que pertenece el programa</small>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Guardar</button>
            <a href="{{ url_for('programa.list') }}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
