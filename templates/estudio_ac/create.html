{% extends "base.html" %}

{% block title %}Nueva Relacion Estudio-Area - Gestion Profesoral{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Nueva Relacion Estudio - Area</h1>
    <a href="{{ url_for('estudio_ac.list') }}" class="btn btn-secondary">← Volver al listado</a>
</div>

<div class="form-container">
    <form method="POST" action="{{ url_for('estudio_ac.create') }}" class="crud-form">
        
        <!-- SELECT PARA ESTUDIO -->
        <div class="form-group">
            <label for="estudio">Estudio *</label>
            <select class="form-select" name="estudio" required>
                <option value="">-- Seleccione Estudio --</option>
                {% for e in estudios or [] %}
                    <option value="{{ e.id }}"
                        {{ 'selected' if registro and registro.estudio == e.id }}>
                        {{ e.titulo }} ({{ e.id }})
                    </option>
                {% endfor %}
            </select>
        </div>
        
        
        <div class="form-group">
            <label for="area_conocimiento">Area de Conocimiento *</label>
            <select class="form-select" name="area_conocimiento" required>
                <option value="">-- Seleccione Area --</option>
                {% for a in areas or [] %}
                    <option value="{{ a.id }}"
                        {{ 'selected' if registro and registro.area_conocimiento == a.id }}>
                        {{ a.disciplina }} ({{ a.id }})
                    </option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-success">Guardar</button>
            <a href="{{ url_for('estudio_ac.list') }}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
