{% extends "base.html" %}

{% block title %}Nueva Beca{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Nueva Beca</h1>
    <a href="{{ url_for('beca.list') }}" class="btn btn-secondary">← Volver al listado</a>
</div>

<div class="form-container">
    <form method="POST" action="{{ url_for('beca.create') }}" class="crud-form">
        
        <div class="form-group">
            <label for="estudios">Estudio Realizado *</label>
            <select class="form-select" name="estudios" id="estudios" required>
                <option value="">Seleccione el Estudio...</option>
                {% for est in estudios_list %}
                    <option value="{{ est.id }}">{{ est.titulo }} (ID: {{ est.id }})</option>
                {% endfor %}
            </select>
            <small class="form-text">Selecciona a qué estudio pertenece esta beca.</small>
        </div>
        
        <div class="form-group">
            <label for="tipo">Tipo de Beca *</label>
            <input type="text" class="form-control" name="tipo" id="tipo" required placeholder="Ej: Excelencia, Investigación...">
        </div>
        
        <div class="form-group">
            <label for="institucion">Institución Otorgante</label>
            <input type="text" class="form-control" name="institucion" id="institucion">
        </div>
        
        <div class="form-group">
            <label for="fecha_inicio">Fecha Inicio</label>
            <input type="date" class="form-control" name="fecha_inicio" id="fecha_inicio">
        </div>
        
        <div class="form-group">
            <label for="fecha_fin">Fecha Fin</label>
            <input type="date" class="form-control" name="fecha_fin" id="fecha_fin">
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-success">Guardar</button>
            <a href="{{ url_for('beca.list') }}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
