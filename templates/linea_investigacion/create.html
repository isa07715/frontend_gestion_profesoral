{% extends "base.html" %}

{% block title %}Nueva Línea de Investigación{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Nueva Línea de Investigación</h1>
    <a href="{{ url_for('linea_investigacion.list') }}" class="btn btn-secondary">← Volver al listado</a>
</div>

<div class="form-container">
    <form method="POST" action="{{ url_for('linea_investigacion.create') }}" class="crud-form">
        
        <div class="form-group">
            <label for="nombre">Nombre *</label>
            <input type="text" class="form-control" name="nombre" id="nombre" required>
        </div>
        
        <div class="form-group">
            <label for="descripcion">Descripción</label>
            <textarea class="form-control" name="descripcion" id="descripcion" rows="4"></textarea>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-success">Guardar</button>
            <a href="{{ url_for('linea_investigacion.list') }}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
