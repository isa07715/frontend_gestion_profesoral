{% extends "base.html" %}

{% block title %}Editar Usuario - Gestion Profesoral{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Editar Usuario del Sistema</h1>
    <a href="{{ url_for('usuario.list') }}" class="btn btn-secondary">← Volver al listado</a>
</div>

<div class="form-container">
    <form method="POST" action="{{ url_for('usuario.edit', id=usuario.id) }}" class="crud-form">
        <div class="form-group">
            <label for="id">ID</label>
            <input type="text" id="id" name="id" value="{{ usuario.id }}" disabled>
            <small class="form-help">El ID no se puede modificar</small>
        </div>
        
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" value="{{ usuario.username }}" maxlength="45" required>
        </div>
        
        <div class="form-group">
            <label for="password">Nueva Contraseña</label>
            <input type="password" id="password" name="password" minlength="6" placeholder="Dejar vacio para mantener la actual">
            <small class="form-help">Solo diligenciar si desea cambiar la contraseña</small>
        </div>
        
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" value="{{ usuario.email }}" maxlength="70" required>
        </div>
        
        <div class="form-group">
            <label for="nombre_completo">Nombre Completo</label>
            <input type="text" id="nombre_completo" name="nombre_completo" value="{{ usuario.nombre_completo }}" maxlength="100" required>
        </div>
        
        <div class="form-group">
            <label for="activo">Estado</label>
            <select id="activo" name="activo" required>
                <option value="true" {% if usuario.activo %}selected{% endif %}>Activo</option>
                <option value="false" {% if not usuario.activo %}selected{% endif %}>Inactivo</option>
            </select>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-warning">Actualizar</button>
            <a href="{{ url_for('usuario.list') }}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
