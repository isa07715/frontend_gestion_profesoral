{% extends "base.html" %}
{% block title %}Nuevo Usuario{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Nuevo Usuario</h1>
    <a href="{{ url_for('usuario.list') }}" class="btn btn-secondary">← Volver</a>
</div>
<div class="form-container">
    <form method="POST" action="{{ url_for('usuario.create') }}" class="crud-form">
        <div class="form-group">
            <label>Username *</label>
            <input type="text" class="form-control" name="username" required minlength="3">
        </div>
        <div class="form-group">
            <label>Contraseña *</label>
            <input type="password" class="form-control" name="password" required minlength="6">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" class="form-control" name="email">
        </div>
        <div class="form-group">
            <label>Nombre Completo *</label>
            <input type="text" class="form-control" name="nombre_completo" required>
        </div>
        <div class="form-group">
            <label><input type="checkbox" name="activo" checked> Usuario Activo</label>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-success">Guardar</button>
            <a href="{{ url_for('usuario.list') }}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
