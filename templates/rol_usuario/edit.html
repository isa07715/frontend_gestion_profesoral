{% extends "base.html" %}

{% block title %}Editar Asignacion de Rol - Gestion Profesoral{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Editar Asignacion de Rol a Usuario</h1>
    <a href="{{ url_for('rol_usuario.list') }}" class="btn btn-secondary">← Volver al listado</a>
</div>

<div class="form-container">
    <form method="POST" action="{{ url_for('rol_usuario.edit', usuario_id=usuario_id, rol_id=rol_id) }}" class="crud-form">
        
        <div class="form-group">
            <label>Usuario ID</label>
            <input type="text" value="{{ registro.usuario_id }}" disabled>
            <small class="form-help">La PK compuesta no se puede modificar</small>
        </div>
        
        <div class="form-group">
            <label>Rol ID</label>
            <input type="text" value="{{ registro.rol_id }}" disabled>
        </div>
        
        <!-- SELECT PARA USUARIO (solo visual, no editable) -->
        <div class="form-group">
            <label for="usuario_id">Usuario *</label>
            <select class="form-select" name="usuario_id" required disabled>
                {% for u in usuarios %}
                    <option value="{{ u.id }}"
                        {{ 'selected' if registro and registro.usuario_id == u.id }}>
                        {{ u.nombre_completo }} - {{ u.username }} ({{ u.id }})
                    </option>
                {% endfor %}
            </select>
        </div>
        
        <!-- SELECT PARA ROL (solo visual, no editable) -->
        <div class="form-group">
            <label for="rol_id">Rol *</label>
            <select class="form-select" name="rol_id" required disabled>
                {% for r in roles %}
                    <option value="{{ r.id }}"
                        {{ 'selected' if registro and registro.rol_id == r.id }}>
                        {{ r.nombre }} ({{ r.id }})
                    </option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-warning">Actualizar</button>
            <a href="{{ url_for('rol_usuario.list') }}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
