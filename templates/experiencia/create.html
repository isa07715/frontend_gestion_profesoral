{% extends "base.html" %}

{% block title %}Nueva Experiencia{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Nueva Experiencia</h1>
    <a href="{{ url_for('experiencia.list') }}" class="btn btn-secondary">← Volver al listado</a>
</div>

<div class="form-container">
    <form method="POST" action="{{ url_for('experiencia.create') }}" class="crud-form">
        
        <div class="form-group">
            <label for="nombre_cargo">Nombre del Cargo *</label>
            <input type="text" class="form-control" name="nombre_cargo" id="nombre_cargo" required>
        </div>
        
        <div class="form-group">
            <label for="institucion">Institución *</label>
            <input type="text" class="form-control" name="institucion" id="institucion" required>
        </div>
        
        <div class="form-group">
            <label for="tipo">Tipo *</label>
            <select class="form-select" name="tipo" id="tipo" required>
                <option value="">Seleccione...</option>
                <option value="Laboral">Laboral</option>
                <option value="Académica">Académica</option>
                <option value="Investigación">Investigación</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="fecha_inicio">Fecha Inicio</label>
            <input type="date" class="form-control" name="fecha_inicio" id="fecha_inicio">
        </div>
        
        <div class="form-group">
            <label for="fecha_fin">Fecha Fin</label>
            <input type="date" class="form-control" name="fecha_fin" id="fecha_fin">
        </div>
        
        <div class="form-group">
            <label for="docente">Docente *</label>
            <select class="form-select" name="docente" id="docente" required>
                <option value="">Seleccione Docente...</option>
                {% for d in docentes %}
                    <option value="{{ d.cedula }}">{{ d.nombres }} {{ d.apellidos }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-success">Guardar</button>
            <a href="{{ url_for('experiencia.list') }}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
