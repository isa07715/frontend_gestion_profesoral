{% extends "base.html" %}

{% block title %}Nueva Participacion en Red - Gestion Profesoral{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Nueva Participacion en Red</h1>
    <a href="{{ url_for('red_docente.list') }}" class="btn btn-secondary">← Volver al listado</a>
</div>

<div class="form-container">
    <form method="POST" action="{{ url_for('red_docente.create') }}" class="crud-form">
        
        <!-- SELECT PARA RED -->
        <div class="form-group">
            <label for="red">Red *</label>
            <select class="form-select" name="red" required>
                <option value="">-- Seleccione Red --</option>
                {% for r in redes %}
                    <option value="{{ r.idr }}"
                        {{ 'selected' if registro and registro.red == r.idr }}>
                        {{ r.nombre }} ({{ r.idr }})
                    </option>
                {% endfor %}
            </select>
        </div>
        
        <!-- SELECT PARA DOCENTE -->
        <div class="form-group">
            <label for="docente">Docente *</label>
            <select class="form-select" name="docente" required>
                <option value="">-- Seleccione Docente --</option>
                {% for d in docentes %}
                    <option value="{{ d.cedula }}"
                        {{ 'selected' if registro and registro.docente == d.cedula }}>
                        {{ d.nombres }} {{ d.apellidos }} ({{ d.cedula }})
                    </option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label for="fecha_inicio">Fecha Inicio *</label>
            <input type="date" id="fecha_inicio" name="fecha_inicio" required>
        </div>
        
        <div class="form-group">
            <label for="fecha_fin">Fecha Fin</label>
            <input type="date" id="fecha_fin" name="fecha_fin">
        </div>
        
        <div class="form-group">
            <label for="act_destacadas">Actividades Destacadas *</label>
            <textarea id="act_destacadas" name="act_destacadas" rows="4" required></textarea>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-success">Guardar</button>
            <a href="{{ url_for('red_docente.list') }}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
