{% extends "base.html" %}

{% block title %}Nuevo Docente - Gestion Profesoral{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Nuevo Docente</h1>
    <a href="{{ url_for('docente.list') }}" class="btn btn-secondary">← Volver al listado</a>
</div>

<div class="form-container">
    <form method="POST" action="{{ url_for('docente.create') }}" class="crud-form">
        <div class="form-group">
            <label for="cedula">Cedula *</label>
            <input type="text" id="cedula" name="cedula" pattern="[0-9]+" maxlength="10" inputmode="numeric" required>
        </div>
        
        <div class="form-group">
            <label for="nombres">Nombres *</label>
            <input type="text" id="nombres" name="nombres" maxlength="60" required>
        </div>
        
        <div class="form-group">
            <label for="apellidos">Apellidos *</label>
            <input type="text" id="apellidos" name="apellidos" maxlength="60" required>
        </div>
        
        <div class="form-group">
            <label for="genero">Genero *</label>
            <select class="form-select" name="genero" required>
                <option value="">-- Seleccione --</option>
                <option value="M">Masculino</option>
                <option value="F">Femenino</option>
                <option value="O">Otro</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="cargo">Cargo *</label>
            <input type="text" id="cargo" name="cargo" maxlength="30" required>
        </div>
        
        <div class="form-group">
            <label for="fecha_nacimiento">Fecha Nacimiento *</label>
            <input type="date" id="fecha_nacimiento" name="fecha_nacimiento" required>
        </div>
        
        <div class="form-group">
            <label for="correo">Correo *</label>
            <input type="email" id="correo" name="correo" maxlength="70" required>
        </div>
        
        <div class="form-group">
            <label for="telefono">Telefono *</label>
            <input type="text" id="telefono" name="telefono" maxlength="20" required>
        </div>
        
        <div class="form-group">
            <label for="url_cvlac">URL CvLAC *</label>
            <input type="url" id="url_cvlac" name="url_cvlac" maxlength="128" required>
        </div>
        
        <div class="form-group">
            <label for="fecha_actualizacion">Fecha Actualizacion *</label>
            <input type="date" id="fecha_actualizacion" name="fecha_actualizacion" required>
        </div>
        
        <div class="form-group">
            <label for="escalafon">Escalafon *</label>
            <input type="text" id="escalafon" name="escalafon" maxlength="45" required>
        </div>
        
        <div class="form-group">
            <label for="perfil">Perfil *</label>
            <textarea id="perfil" name="perfil" rows="4" required></textarea>
        </div>
        
        <div class="form-group">
            <label for="cat_minciencia">Categoria Minciencia</label>
            <input type="text" id="cat_minciencia" name="cat_minciencia" maxlength="45">
        </div>
        
        <div class="form-group">
            <label for="conv_minciencia">Convocatoria Minciencia *</label>
            <input type="text" id="conv_minciencia" name="conv_minciencia" maxlength="45" required>
        </div>
        
        <div class="form-group">
            <label for="nacionalidaad">Nacionalidad *</label>
            <input type="text" id="nacionalidaad" name="nacionalidaad" maxlength="45" required>
        </div>
        
        
        <div class="form-group">
            <label for="linea_investigacion_principal">Linea de Investigacion Principal</label>
            <select class="form-select" name="linea_investigacion_principal">
                <option value="">-- Seleccione Linea --</option>
                {% for li in lineas %}
                    <option value="{{ li.id }}"
                        {{ 'selected' if registro and registro.linea_investigacion_principal == li.id }}>
                        {{ li.nombre }} ({{ li.id }})
                    </option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-success">Guardar</button>
            <a href="{{ url_for('docente.list') }}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
