{% extends "base.html" %}

{% block title %}Editar Reconocimiento - Gestion Profesoral{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Editar Reconocimiento</h1>
    <a href="{{ url_for('reconocimiento.list') }}" class="btn btn-secondary">← Volver al listado</a>
</div>

<div class="form-container">
    <form method="POST" action="{{ url_for('reconocimiento.edit', id=reconocimiento.id) }}" class="crud-form">
        
        <div class="form-group">
            <label for="id">ID</label>
            <input type="text" id="id" name="id" value="{{ reconocimiento.id }}" disabled>
        </div>
        
        <!-- SELECT PARA DOCENTE -->
        <div class="form-group">
            <label for="docente">Docente *</label>
            <select class="form-select" name="docente" required>
                <option value="">-- Seleccione Docente --</option>
                {% for d in docentes %}
                    <option value="{{ d.cedula }}"
                        {{ 'selected' if registro and registro.docente == d.cedula }}>
                        {{ d.nombres }} {{ d.apellidos }} ({{ d.cedula }})
                    </option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" name="nombre" value="{{ reconocimiento.nombre }}" maxlength="45" required>
        </div>
        
        <div class="form-group">
            <label for="tipo">Tipo</label>
            <input type="text" id="tipo" name="tipo" value="{{ reconocimiento.tipo }}" maxlength="45" required>
        </div>
        
        <div class="form-group">
            <label for="institucion">Institucion</label>
            <input type="text" id="institucion" name="institucion" value="{{ reconocimiento.institucion }}" maxlength="45" required>
        </div>
        
        <div class="form-group">
            <label for="ambito">Ambito</label>
            <select class="form-select" name="ambito" required>
                <option value="Local" {% if reconocimiento.ambito == 'Local' %}selected{% endif %}>Local</option>
                <option value="Regional" {% if reconocimiento.ambito == 'Regional' %}selected{% endif %}>Regional</option>
                <option value="Nacional" {% if reconocimiento.ambito == 'Nacional' %}selected{% endif %}>Nacional</option>
                <option value="Internacional" {% if reconocimiento.ambito == 'Internacional' %}selected{% endif %}>Internacional</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="fecha">Fecha</label>
            <input type="date" id="fecha" name="fecha" value="{{ reconocimiento.fecha }}" required>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-warning">Actualizar</button>
            <a href="{{ url_for('reconocimiento.list') }}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
