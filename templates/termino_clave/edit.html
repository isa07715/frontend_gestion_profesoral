{% extends "base.html" %}

{% block title %}Editar Término Clave - Gestión Profesoral{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Editar Término Clave</h1>
    <a href="{{ url_for('termino_clave.list') }}" class="btn btn-secondary">← Volver al listado</a>
</div>

<div class="form-container">
    <form method="POST" action="{{ url_for('termino_clave.edit', termino=termino.termino) }}" class="crud-form">
        <div class="form-group">
            <label for="termino">Término (Español)</label>
            <input type="text" id="termino" name="termino" value="{{ termino.termino }}" disabled>
            <small class="form-help">El término no se puede modificar (es la llave primaria)</small>
        </div>
        
        <div class="form-group">
            <label for="termino_ingles">Término (Inglés)</label>
            <input type="text" id="termino_ingles" name="termino_ingles" value="{{ termino.termino_ingles or '' }}" maxlength="30">
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-warning">Actualizar</button>
            <a href="{{ url_for('termino_clave.list') }}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
