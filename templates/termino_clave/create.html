{% extends "base.html" %}

{% block title %}Crear Término Clave - Gestión Profesoral{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Nuevo Término Clave</h1>
    <a href="{{ url_for('termino_clave.list') }}" class="btn btn-secondary">← Volver al listado</a>
</div>

<div class="form-container">
    <form method="POST" action="{{ url_for('termino_clave.create') }}" class="crud-form">
        <div class="form-group">
            <label for="termino">Término (Español) *</label>
            <input type="text" id="termino" name="termino" required maxlength="30">
            <small class="form-help">Ejemplo: Inteligencia Artificial, Machine Learning</small>
        </div>
        
        <div class="form-group">
            <label for="termino_ingles">Término (Inglés)</label>
            <input type="text" id="termino_ingles" name="termino_ingles" maxlength="30">
            <small class="form-help">Ejemplo: Artificial Intelligence, Machine Learning</small>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Guardar</button>
            <a href="{{ url_for('termino_clave.list') }}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
