{% extends "base.html" %}

{% block title %}Editar Area de Conocimiento - Gestion Profesoral{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Editar Area de Conocimiento</h1>
    <a href="{{ url_for('area_conocimiento.list') }}" class="btn btn-secondary">← Volver al listado</a>
</div>

<div class="form-container">
    <form method="POST" action="{{ url_for('area_conocimiento.edit', id=area.id) }}" class="crud-form">
        <div class="form-group">
            <label for="id">ID</label>
            <input type="number" id="id" name="id" value="{{ area.id }}" disabled>
            <small class="form-help">El ID no se puede modificar (es la llave primaria)</small>
        </div>
        
        <div class="form-group">
            <label for="gran_area">Gran Area</label>
            <input type="text" id="gran_area" name="gran_area" value="{{ area.gran_area }}" maxlength="100" required>
        </div>
        
        <div class="form-group">
            <label for="area">Area</label>
            <input type="text" id="area" name="area" value="{{ area.area }}" maxlength="100" required>
        </div>
        
        <div class="form-group">
            <label for="disciplina">Disciplina</label>
            <input type="text" id="disciplina" name="disciplina" value="{{ area.disciplina }}" maxlength="100" required>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-warning">Actualizar</button>
            <a href="{{ url_for('area_conocimiento.list') }}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
